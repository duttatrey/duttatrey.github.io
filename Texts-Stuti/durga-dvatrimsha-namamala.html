        note:"The phalaśruti — 'the fruit of recitation' — is the standard closing device of Sanskrit stotras. Two details here are theologically significant. First, the Devī speaks in the first person: nāmāvalimimāṃ durgāyā mama — 'this garland of my names.' The names are not a human composition about her; they are her own self-disclosure, given in the Devī Māhātmyam when the gods asked how to overcome their enemies. Second, the promise is unqualified and total: sarvabhayānmuktaḥ — 'freed from all fears.' In the Śākta understanding all fear traces back to one root: the ego's sense of being separate and unprotected. The Devī removes this root fear by revealing that the devotee was never separate from her. Na saṃśayaḥ — 'no doubt' — is the seal of the Devī's own word on that promise."
